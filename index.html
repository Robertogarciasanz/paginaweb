<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presupuestos — EXCAVACIONES ARTURO S.L.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f4f4;--surface:#ffffff;
  --text:#1a1a1a;--accent:#d84315; /* Naranja corporativo Arturo S.L. */
  --border:#dddddd;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);scroll-behavior:smooth;}

header{background:#1a1a1a;color:#fff;padding:20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:4px solid var(--accent);}
header h1{font-size:18px;letter-spacing:1px;}

main{max-width:900px;margin:20px auto;padding:0 15px;}

/* MENÚ DE INICIO: 4 PALABRAS CON VÍNCULO */
.inicio-nav{display:grid;grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));gap:15px;margin-bottom:30px;}
.vinculo-card{background:#1a1a1a;color:#fff;padding:25px;text-align:center;border-radius:var(--radius);cursor:pointer;font-weight:bold;text-transform:uppercase;transition:0.3s;border:none;font-size:14px;letter-spacing:1px;}
.vinculo-card:hover{background:var(--accent);transform:translateY(-3px);box-shadow:0 10px 20px rgba(216,67,21,0.2);}

.card{background:var(--surface);border-radius:var(--radius);padding:25px;margin-bottom:30px;box-shadow:0 4px 15px rgba(0,0,0,0.05);border:1px solid var(--border);}
.card-title{font-weight:bold;text-transform:uppercase;color:var(--accent);margin-bottom:20px;font-size:16px;border-left:5px solid var(--accent);padding-left:15px;}

/* BOTÓN VOLVER ARRIBA */
#btn-subir {
  display: none; position: fixed; bottom: 20px; right: 20px; z-index: 99;
  border: none; outline: none; background-color: var(--accent); color: white;
  cursor: pointer; padding: 15px; border-radius: 50%; font-size: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s;
}
#btn-subir:hover { background-color: #1a1a1a; }

/* TARJETAS DE PRECIOS */
.tarjeta-precio{margin-bottom:40px;scroll-margin-top:100px; padding: 15px; border: 1px solid #eee; border-radius: 8px;}
.item-fila{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.item-fila strong{color:var(--accent);}

/* EDITOR DE PRESUPUESTO */
.linea-row{display:grid;grid-template-columns:1fr 80px 100px 40px;gap:10px;margin-bottom:10px;align-items:center;}
.linea-row input{padding:10px;border:1px solid var(--border);border-radius:6px;width:100%;}

#pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;padding:20px;overflow-y:auto;}
#pdf-modal{background:#fff;max-width:800px;margin:0 auto;padding:40px;border-radius:8px;}

@media(max-width:600px){ .inicio-nav{grid-template-columns:1fr 1fr;} .linea-row{grid-template-columns: 1fr;} }
</style>
</head>
<body id="top">

<header>
  <h1>EXCAVACIONES ARTURO S.L.</h1>
  <div id="header-total" style="font-weight:bold;color:var(--accent);">0.00 €</div>
</header>

<button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="btn-subir" title="Volver al inicio">↑</button>

<main>
  <div class="card">
    <div class="card-title">Selecciona para ver precios</div>
    <div class="inicio-nav">
      <button class="vinculo-card" onclick="irA('excavaciones')">Excavaciones</button>
      <button class="vinculo-card" onclick="irA('piscinas')">Piscinas</button>
      <button class="vinculo-card" onclick="irA('albanileria')">Albañilería</button>
      <button class="vinculo-card" onclick="irA('alquileres')">Alquileres</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Crear Nuevo Presupuesto</div>
    <input type="text" id="cliente" placeholder="Nombre del Cliente" style="width:100%;padding:12px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;">
    
    <div style="display:flex;gap:10px;margin-bottom:20px;">
      <select id="sel-cat" onchange="cargarItems()" style="flex:1;padding:10px;border-radius:6px;">
        <option value="">-- Categoría --</option>
        <option value="excavaciones">Excavaciones</option>
        <option value="piscinas">Piscinas</option>
        <option value="albanileria">Albañilería</option>
        <option value="alquileres">Alquileres</option>
      </select>
      <select id="sel-item" style="flex:2;padding:10px;border-radius:6px;"><option value="">Elige trabajo...</option></select>
    </div>
    <button onclick="agregarAlPresupuesto()" style="padding:12px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;width:100%;">+ AÑADIR A LA LISTA</button>

    <div id="lista-presupuesto" style="margin-top:25px;"></div>

    <div style="text-align:right;margin-top:20px;padding-top:15px;border-top:2px solid var(--accent);">
      <div style="font-size:24px;font-weight:bold;color:var(--accent);">TOTAL: <span id="val-total">0.00 €</span></div>
      <button onclick="generarDocumento()" style="margin-top:15px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;width:100%;">GENERAR PDF PARA CLIENTE</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tarifas Detalladas</div>
    <div id="contenedor-tarifas"></div>
  </div>
</main>

<div id="pdf-overlay">
  <div id="pdf-modal">
    <div id="pdf-body"></div>
    <div style="text-align:right;margin-top:20px;">
      <button onclick="document.getElementById('pdf-overlay').style.display='none'" style="padding:10px 20px;">Cerrar</button>
      <button onclick="window.print()" style="padding:10px 20px;background:#1a1a1a;color:#fff;margin-left:10px;cursor:pointer;">Imprimir</button>
    </div>
  </div>
</div>

<script>
const CATALOGO = {
  excavaciones: [
    {desc:"Excavación de zanjas", precio:15.50, unidad:"m³"},
    {desc:"Vaciado de tierras", precio:12.00, unidad:"m³"}
  ],
  piscinas: [
    {desc:"Excavación vaso piscina", precio:19.50, unidad:"m³"},
    {desc:"Gunitado de hormigón", precio:42.00, unidad:"m²"}
  ],
  albanileria: [
    {desc:"Tabiquería de ladrillo", precio:24.00, unidad:"m²"},
    {desc:"Solera de hormigón", precio:28.00, unidad:"m²"}
  ],
