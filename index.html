:root{
  --bg:#f0ede8;--surface:#faf9f7;--surface2:#f5f3ef;
  --border:#ddd9d2;--border2:#ccc8c0;

  --accent:#c94a1f;--radius:10px;--radius-sm:6px;
  --demo-bg:#fdf0eb;--demo:#c94a1f;

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;padding-bottom:40px;}

header{
  background:var(--text);color:#fff;
  padding:12px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  flex-wrap:wrap;gap:8px;
}
header h1{font-size:14px;font-weight:600;line-height:1.3;}
.hbadge{font-size:15px;font-weight:bold;color:#ffb74d;font-family:'DM Mono',monospace;white-space:nowrap;}

main{max-width:1100px;margin:20px auto;padding:0 16px;}

.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:9px 18px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:#fff;font-weight:600;font-size:13px;}
.tab.active{background:var(--text);color:#fff;}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px;}
.card-title{font-size:14px;font-weight:bold;margin-bottom:12px;color:var(--text);}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
