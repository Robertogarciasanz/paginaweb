<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestos — Excavaciones Arturo S.L.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --accent: #d84315; --text: #1a1a1a; }
        /* CSS Crítico para evitar SPOF y bloqueos de visualización */
        body { font-family: 'DM Sans', sans-serif; margin: 0; background: #f4f4f4; color: var(--text); }
        header { 
            background: #1a1a1a; color: #fff; padding: 20px; 
            display: flex; justify-content: space-between; align-items: center;
            min-height: 70px; border-bottom: 4px solid var(--accent);
        }
        main { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        /* Optimización de selectores para rapidez de CPU */
        .btn-add { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<header>
    <h1>⚙️ Arturo S.L.</h1>
    <div id="total-display" aria-live="polite" style="color:var(--accent); font-weight:bold;">0,00 €</div>
</header>

<main>
    <section class="card">
        <h2>Crear Presupuesto</h2>
        <label for="cliente" class="sr-only">Nombre del Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del Cliente" style="width:100%; padding:12px; margin-top:10px; border:1px solid #ccc; border-radius:6px;">
        
        <div id="lista-items" style="margin: 20px 0;"></div>
        
        <div style="text-align:right; border-top: 2px solid var(--accent); padding-top:10px;">
            <button class="btn-add" onclick="exportarPDF()">GENERAR DOCUMENTO</button>
        </div>
    </section>

    <section class="card">
        <h3>Tarifas de Excavación</h3>
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee;">
            <span>Excavación zanjas (m³) - 15,50 €</span>
            <button class="btn-add" onclick="agregar('Excavación zanjas', 15.5)">+ Añadir</button>
        </div>
    </section>
</main>

<script>
    /* JavaScript optimizado: Carga diferida y sin bloqueo del hilo principal */
    let presupuesto = [];

    function agregar(nombre, precio) {
        presupuesto.push({ nombre, precio });
        actualizarUI();
    }

    function actualizarUI() {
        const lista = document.getElementById('lista-items');
        const total = presupuesto.reduce((acc, item) => acc + item.precio, 0);
        
        lista.innerHTML = presupuesto.map(i => `<div>${i.nombre}: ${i.precio.toFixed(2)}€</div>`).join('');
        document.getElementById('total-display').innerText = total.toFixed(2).replace('.', ',') + ' €';
    }

    function exportarPDF() {
        if (presupuesto.length === 0) return alert('Presupuesto vacío');
        window.print(); // Uso de API nativa para evitar scripts de terceros pesados
    }
</script>
</body>
</html>
