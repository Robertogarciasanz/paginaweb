<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presupuestos — Excavaciones y ser. Arturo S.L.</title>
    <meta name="description" content="Generador de presupuestos online para excavaciones, piscinas, albañilería y alquiler de maquinaria en Valladolid.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    
    <style>
        :root{
            --bg:#f4f4f4; --surface:#ffffff;
            --text:#1a1a1a; --accent:#d84315; /* Contraste mejorado */
            --border:#dddddd; --radius:12px;
        }
        *{box-sizing:border-box; margin:0; padding:0;}
        body{font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); scroll-behavior:smooth; line-height: 1.5;}

        header{background:#1a1a1a; color:#fff; padding:20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; border-bottom:4px solid var(--accent);}
        header h1{font-size:1.2rem; letter-spacing:1px;}

        main{max-width:900px; margin:20px auto; padding:0 15px;}

        /* Accesibilidad: Focus visible para navegación por teclado */
        button:focus {outline: 3px solid var(--accent); outline-offset: 2px;}

        .inicio-nav{display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:15px; margin-bottom:10px;}
        .vinculo-card{
            background:#1a1a1a; color:#fff; padding:25px; text-align:center;
            border-radius:var(--radius); cursor:pointer; font-weight:bold;
            text-transform:uppercase; transition:0.3s; border:none; font-size:14px;
            letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .vinculo-card:hover{background:var(--accent); transform:translateY(-3px); box-shadow:0 10px 20px rgba(216,67,21,0.3);}

        .card{background:var(--surface); border-radius:var(--radius); padding:25px; margin-bottom:30px; box-shadow:0 4px 15px rgba(0,0,0,0.05); border:1px solid var(--border);}
        .card-title{font-weight:bold; text-transform:uppercase; color:var(--accent); margin-bottom:20px; font-size:16px; border-left:5px solid var(--accent); padding-left:15px;}

        /* Botón subir corregido con aria-label */
        #btn-subir{
            display:none; position:fixed; bottom:20px; right:20px; z-index:99;
            border:none; background-color:var(--accent); color:white;
            cursor:pointer; padding:15px; border-radius:50%; font-size:18px;
            box-shadow:0 4px 10px rgba(0,0,0,0.3); transition:0.3s;
        }

        /* Tarifas */
        .tarjeta-precio{margin-bottom:30px; scroll-margin-top:100px; padding:20px; border:1px solid #eee; border-radius:10px; background:#fafafa;}
        .item-fila{display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f0f0f0;}
        
        /* Ocultar elementos visualmente pero no para lectores de pantalla */
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

        @media(max-width:600px){
            .inicio-nav{grid-template-columns:1fr 1fr;}
            .vinculo-card{padding:18px; font-size: 12px;}
        }
    </style>
</head>
<body>

<header>
    <h1>⚙️ Excavaciones Arturo S.L.</h1>
    <div id="header-total" aria-live="polite" style="font-weight:bold;color:var(--accent);">0.00 €</div>
</header>

<button onclick="window.scrollTo({top:0,behavior:'smooth'})" id="btn-subir" aria-label="Volver arriba">↑</button>

<main id="main-content">
    <section class="card" aria-labelledby="nav-title">
        <h2 id="nav-title" class="card-title">Selecciona un servicio</h2>
        <nav class="inicio-nav">
            <button class="vinculo-card" onclick="irA('excavaciones')">🚜 Excavaciones</button>
            <button class="vinculo-card" onclick="irA('piscinas')">🏊 Piscinas</button>
            <button class="vinculo-card" onclick="irA('albanileria')">🧱 Albañilería</button>
            <button class="vinculo-card" onclick="irA('alquileres')">🏗️ Alquileres</button>
        </nav>
    </section>

    <section class="card" aria-labelledby="editor-title">
        <h2 id="editor-title" class="card-title">Crear Nuevo Presupuesto</h2>
        <label for="cliente" class="sr-only">Nombre del Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del Cliente" style="width:100%;padding:12px;margin-bottom:15px;border-radius:6px;border:1px solid #ccc;">
        
        <div id="lista-presupuesto" role="region" aria-live="polite">
            </div>

        <div style="text-align:right;margin-top:20px;padding-top:15px;border-top:2px solid var(--accent);">
            <div style="font-size:24px;font-weight:bold;color:var(--accent);">TOTAL: <span id="val-total">0.00 €</span></div>
            <button onclick="generarDocumento()" style="margin-top:15px;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold;width:100%;font-size:15px;">
                📄 GENERAR PDF PARA CLIENTE
            </button>
        </div>
    </section>

    <section class="card">
        <h2 class="card-title">Tarifas Detalladas</h2>

        <article class="tarjeta-precio" id="excavaciones">
            <h3>🚜 Excavaciones</h3>
            <div class="item-fila">
                <span class="desc">Excavación de zanjas</span>
                <span class="precio-ud">
                    <strong>15,50 €</strong> / m³
                    <button class="btn-add-item" onclick="addLinea('Excavación de zanjas',15.50,'m³')" aria-label="Añadir Excavación de zanjas al presupuesto">+ Añadir</button>
                </span>
            </div>
            </article>
    </section>
</main>

<div id="pdf-overlay" role="dialog" aria-modal="true" aria-labelledby="pdf-title">
    <div id="pdf-modal">
        <h2 id="pdf-title" class="sr-only">Vista previa del presupuesto</h2>
        <div id="pdf-body"></div>
        <div style="text-align:right;margin-top:20px;">
            <button onclick="document.getElementById('pdf-overlay').style.display='none'" style="padding:10px 20px;border-radius:6px;cursor:pointer;">Cerrar</button>
            <button onclick="window.print()" style="padding:10px 20px;background:#1a1a1a;color:#fff;margin-left:10px;cursor:pointer;border-radius:6px;border:none;">🖨️ Imprimir</button>
        </div>
    </div>
</div>

<script>
    // Tu lógica de JS permanece igual pero optimizada para accesibilidad
    function irA(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    let lineas = [];

    function addLinea(desc, precio, unidad) {
        lineas.push({ desc, precio, unidad, cant: 1 });
        renderLineas();
    }

    function renderLineas() {
        const cont = document.getElementById('lista-presupuesto');
        if (lineas.length === 0) {
            cont.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">No hay servicios añadidos</p>';
            actualizarTotal();
            return;
        }
        cont.innerHTML = lineas.map((l, i) => `
            <div class="linea-row" style="background:#f9f9f9;padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">
                <span style="flex:2"><strong>${l.desc}</strong></span>
                <label class="sr-only" for="cant-${i}">Cantidad para ${l.desc}</label>
                <input type="number" id="cant-${i}" value="${l.cant}" min="0.1" step="0.1" 
                       onchange="lineas[${i}].cant=parseFloat(this.value)||1;actualizarTotal()"
                       style="width:60px;padding:5px;margin:0 10px;">
                <span style="flex:1;text-align:right;">${(l.precio * l.cant).toFixed(2)} €</span>
                <button onclick="lineas.splice(${i},1);renderLineas()" aria-label="Eliminar ${l.desc}"
                        style="background:#fee2e2;color:#b91c1c;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;margin-left:10px;">✕</button>
            </div>
        `).join('');
        actualizarTotal();
    }

    function actualizarTotal() {
        const total = lineas.reduce((s, l) => s + l.precio * l.cant, 0);
        const fmt = total.toFixed(2).replace('.', ',') + ' €';
        document.getElementById('val-total').innerText = fmt;
        document.getElementById('header-total').innerText = fmt;
    }

    window.onscroll = () => {
        document.getElementById('btn-subir').style.display = window.scrollY > 300 ? 'block' : 'none';
    };

    renderLineas();
</script>
</body>
</html>
